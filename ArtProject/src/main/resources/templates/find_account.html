<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>A View of Mind : 계정 찾기</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --navy:#13315E;
      --line:#d8dee8;
      --muted:#8b97a8;
      --danger:#E45742;
      --success:#2ea043;
    }

    body{
      background:#fff;
      font-family:"inter";
    }

    .page-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .find-card{
      width:min(420px,100%);
    }

    .brand-title{
      text-align:center;
      font-weight:800;
      color:var(--navy);
      font-size:32px;
      margin-bottom:28px;
    }

    .pill-group{
      position:relative;
      margin-bottom:12px;
    }

    .pill-control{
      width:100%;
      height:60px;
      border-radius:28px;
      border:2px solid var(--line);
      padding:0 22px;
      font-size:15px;
    }

    .pill-control:focus{
      outline:none;
      border-color:var(--navy);
    }

    .pill-control::placeholder{ color:var(--muted); }

    .pill-control.is-filled{ border-color:var(--navy); }

    .pill-control.is-error{
      border-color:var(--danger);
      color:var(--danger);
    }

    .field-error{
      display:none;
      font-size:12px;
      color:var(--danger);
      margin:8px 0 0 22px;
      font-weight:600;
    }

    .pill-group:has(.is-error) .field-error{ display:block; }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:20px;
    }

    .btn-find{
      flex:1;
      height:56px;
      border-radius:28px;
      border:2px solid var(--navy);
      background:#fff;
      color:var(--navy);
      font-size:15px;
      font-weight:500;
      transition:.2s;
    }

    .btn-find.primary{
      background:var(--navy);
      color:#fff;
    }

    .btn-find:hover{
      font-weight:700;
    }

    .result-box{
      display:none;
      margin-top:26px;
      padding:18px 20px;
      border-radius:20px;
      background:#f7f9fc;
      border:1.5px solid var(--line);
      text-align:center;
    }

    .result-box.show{ display:block; }

    .result-title{
      font-weight:700;
      color:var(--navy);
      margin-bottom:6px;
    }

    .result-value{
      font-size:18px;
      font-weight:800;
      color:var(--success);
      margin:8px 0;
      letter-spacing:.5px;
    }

    .result-sub{
      font-size:12px;
      color:var(--muted);
    }

    .link-row{
      margin-top:22px;
      text-align:center;
      font-size:13px;
    }

    .link-row a{
      color:var(--muted);
      text-decoration:none;
      transition:.15s;
    }

    .link-row a:hover{
      color:var(--navy);
      font-weight:600;
    }
	/* 회색 비활성 버튼 */
	.btn-find.disabled{
	  background:#f2f4f8;
	  border-color:#e1e6ef;
	  color:var(--muted);
	  cursor:not-allowed;
	}

	/* 네이비 메인 버튼 */
	.btn-find.primary{
	  background:var(--navy);
	  color:#fff;
	}

	.result-value.error{
	  color: var(--danger);
	}

	/* 커스텀 토스트 */
	.custom-toast{
	  position: fixed;
	  bottom: 32px;
	  left: 50%;
	  transform: translateX(-50%) translateY(20px);
	  min-width: 280px;
	  max-width: 90%;
	  padding: 14px 22px;
	  border-radius: 24px;
	  background: #fff;
	  border: 1.5px solid var(--navy);
	  color: var(--navy);
	  font-size: 14px;
	  font-weight: 600;
	  text-align: center;
	  opacity: 0;
	  pointer-events: none;
	  transition: all .35s ease;
	  z-index: 9999;
	}

	.custom-toast.show{
	  opacity: 1;
	  transform: translateX(-50%) translateY(0);
	}

  </style>
</head>

<body>
<div class="page-wrap">
  <div class="find-card">

    <div class="brand-title">A View of Mind</div>

    <!-- 입력 영역 -->
    <div class="pill-group">
      <input class="pill-control" placeholder="이름" id="name">
      <div class="field-error">이름을 입력해주세요.</div>
    </div>

    <div class="pill-group">
      <input class="pill-control" placeholder="휴대전화번호 (하이픈 제외)" id="phone">
      <div class="field-error">휴대전화번호를 입력해주세요.</div>
    </div>

    <div class="pill-group">
      <input class="pill-control" placeholder="이메일 주소" id="email">
      <div class="field-error">이메일을 입력해주세요.</div>
    </div>

	<!-- 비밀번호 찾기 안내 -->
	<div class="text-center mb-8" style="font-size:13px; color:var(--muted);">
	  비밀번호 찾기 기능은 <strong>제공 예정</strong>입니다
	</div>
    <!-- 버튼 -->
    <div class="btn-row">
		<button type="button" class="btn-find primary" id="findIdBtn">아이디 찾기</button>
		<button type="button" class="btn-find disabled" id="findPwBtn">비밀번호 찾기</button>
    </div>

    <!-- 결과 -->
    <div class="result-box" id="resultBox">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-value" id="resultValue"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <div class="link-row">
      <a href="/login">로그인으로 돌아가기</a>
    </div>

  </div>
</div>
<div id="toast" class="custom-toast">
  <span id="toastMessage"></span>
</div>


<script>
  const inputs = document.querySelectorAll('.pill-control');

  const resultBox = document.getElementById('resultBox');
  const resultTitle = document.getElementById('resultTitle');
  const resultValue = document.getElementById('resultValue');
  const resultSub = document.getElementById('resultSub');

  const name = document.getElementById('name');
  const phone = document.getElementById('phone');
  const email = document.getElementById('email');

  /* =========================
     입력 상태 처리
  ========================= */
  inputs.forEach(input => {
    input.addEventListener('input', () => {
      input.classList.toggle('is-filled', input.value.trim().length > 0);
      input.classList.remove('is-error');
    });
  });

  /* =========================
     입력값 검증
  ========================= */
  function validate() {
    let valid = true;

    inputs.forEach(input => {
      if (!input.value.trim()) {
        input.classList.add('is-error');
        valid = false;
      }
    });

    return valid;
  }

  /* =========================
     아이디 찾기
  ========================= */
  document.getElementById('findIdBtn').addEventListener('click', async () => {
    if (!validate()) return;

    resultBox.classList.add('show');

    try {
      const res = await fetch('/api/user/find-id', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name.value,
          phonenumber: phone.value,
          email: email.value
        })
      });

      resultTitle.textContent = '아이디 찾기 결과';

      if (!res.ok) {
        resultValue.textContent = '일치하는 계정이 없습니다';
        resultValue.classList.add('error'); // 🔴 빨간 글씨
        resultSub.textContent = '입력하신 정보로 가입된 계정을 찾을 수 없습니다.';
        return;
      }

      const data = await res.json();

      resultValue.textContent = data.username;
      resultValue.classList.remove('error'); // 🟢 성공 시 복구
      resultSub.textContent = '가입된 아이디입니다.';

    } catch (e) {
      resultTitle.textContent = '오류 발생';
      resultValue.textContent = '잠시 후 다시 시도해주세요';
      resultValue.classList.add('error');
      resultSub.textContent = '네트워크 오류가 발생했습니다.';
    }
  });

  /* =========================
     비밀번호 찾기 (비활성)
  ========================= */
  document.getElementById('findPwBtn').addEventListener('click', () => {
    showToast('비밀번호 찾기 기능은 추후 제공될 예정입니다.');
  });

  function showToast(message) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    toastMessage.textContent = message;
    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
    }, 1500);
  }

</script>

</body>
</html>
