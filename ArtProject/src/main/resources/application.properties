spring.application.name=ArtProject

# MySQL JDBC URL: 기본 포트 3306
# spring.datasource.url=jdbc:mysql://localhost:3306/choi?serverTimezone=UTC&useSSL=false
spring.datasource.url=jdbc:mysql://localhost:3306/park?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true

# MySQL 사용자 이름
spring.datasource.username=park

# MySQL 비밀번호
spring.datasource.password=park

# MySQL 드라이버 클래스 이름 (최신 Spring Boot 버전에서는 생략 가능)
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework.security=TRACE

spring.security.debug=true